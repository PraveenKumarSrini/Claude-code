name: CI - Module 8 AI Toolkit

on:
  push:
    branches: [main]
    paths: ["Module-8/module-6-ai-toolkit/**"]
  pull_request:
    branches: [main]
    paths: ["Module-8/module-6-ai-toolkit/**"]

defaults:
  run:
    working-directory: Module-8/module-6-ai-toolkit

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Module-8/module-6-ai-toolkit/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test -- --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Module-8/module-6-ai-toolkit/package-lock.json
      - run: npm ci
      - run: npm run build

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Module-8/module-6-ai-toolkit/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
